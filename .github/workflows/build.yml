name: Build Theos Tweak

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          echo "$HOME/theos/bin" >> $GITHUB_PATH

      - name: Install build dependencies (không cần ldid)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            git \
            unzip \
            libssl-dev \
            zlib1g-dev \
            libbz2-dev \
            libreadline-dev \
            libsqlite3-dev \
            libncurses5-dev \
            xz-utils \
            tk-dev \
            libxml2-dev \
            libxmlsec1-dev \
            libffi-dev \
            liblzma-dev \
            python3-openssl

      - name: Build tweak
        run: |
          export THEOS=$HOME/theos
          # Tạo thư mục vendor/lib để tránh lỗi nếu thiếu
          mkdir -p $THEOS/vendor/lib
          make package

      - name: Rename .dylib to .lylib (tuỳ chọn)
        run: |
          if [ -f .theos/obj/debug/RobloxVNGKiller.dylib ]; then
            cp .theos/obj/debug/RobloxVNGKiller.dylib RobloxVNGKiller.lylib
          elif [ -f .theos/obj/debug/RobloxVNGKiller.dylib ]; then
            cp .theos/obj/debug/RobloxVNGKiller.dylib RobloxVNGKiller.lylib
          else
            echo "Không tìm thấy .dylib, bỏ qua"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TweakPackage
          path: |
            packages/*.deb
            .theos/obj/**/*.dylib
            *.lylib
